---
name: MERN App Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Images
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mern-client:latest ./client
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mern-server:latest ./server

          docker push ${{ secrets.DOCKER_USERNAME }}/mern-client:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/mern-server:latest

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/mern-client:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/mern-server:latest

            docker stop client || true
            docker rm client || true

            docker stop server || true
            docker rm server || true

            docker run -d \
              --name client \
              -p 80:80 \
              ${{ secrets.DOCKER_USERNAME }}/mern-client:latest

            docker run -d \
              --name server \
              -p 5000:5000 \
              ${{ secrets.DOCKER_USERNAME }}/mern-server:latest